<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>Hwei's Daily Briefing</title>
<style>
  :root{
    --bg:#000000; --side:#0a0a0b; --card:#0d0d0f; --line:#1f1f23;
    --text:#ededed; --dim:#8a8a90; --faint:#5c5c63; --accent:#c2a36b;
  }
  *{box-sizing:border-box}
  html,body{background:var(--bg);margin:0}
  body{color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",
      "Segoe UI",Roboto,"Helvetica Neue",sans-serif;line-height:1.6;
    -webkit-font-smoothing:antialiased;letter-spacing:-.01em}
  a{color:inherit}

  .layout{display:flex;align-items:flex-start}
  /* ---- 사이드바 (안 잘리게: align-self + max-height) ---- */
  .sidebar{width:240px;flex:0 0 240px;position:sticky;top:0;align-self:flex-start;
    max-height:100vh;overflow-y:auto;background:var(--side);border-right:1px solid var(--line);
    padding:18px 16px}
  .brand{font-size:1.1rem;font-weight:700;letter-spacing:-.02em;margin:0}
  .brand .dot{color:var(--accent)}
  .brand-sub{font-size:.68rem;color:var(--faint);margin:2px 0 14px}
  .search{width:100%;background:#141416;border:1px solid var(--line);border-radius:8px;
    color:var(--text);padding:7px 11px;font-size:.84rem;margin:0 0 14px;outline:none}
  .search:focus{border-color:var(--accent)}
  .nav-h{font-size:.64rem;font-weight:700;letter-spacing:.14em;color:var(--faint);
    text-transform:uppercase;margin:0 0 6px}
  .cat{display:flex;align-items:center;justify-content:space-between;width:100%;text-align:left;
    background:none;border:none;cursor:pointer;color:var(--dim);font-size:.88rem;padding:6px 10px;
    border-radius:8px;margin-bottom:2px;font-family:inherit}
  .cat:hover{background:#141416;color:var(--text)}
  .cat.active{background:#16140f;color:var(--accent);font-weight:600}
  .cat .badge{font-size:.7rem;color:var(--accent);background:rgba(194,163,107,.12);
    border-radius:10px;padding:0 7px;min-width:18px;text-align:center}
  .nav-sec{margin-bottom:16px}

  /* ---- 미니 달력 (작게) ---- */
  .cal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .cal-top button{background:none;border:none;color:var(--dim);cursor:pointer;font-size:.95rem;
    padding:1px 7px;border-radius:6px;line-height:1}
  .cal-top button:hover{background:#141416;color:var(--text)}
  .cal-title{font-size:.8rem;font-weight:600;color:var(--text)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;width:100%}
  .cal-wd{font-size:.54rem;color:var(--faint);text-align:center;padding:1px 0}
  .cal-day{font-size:.64rem;text-align:center;height:21px;border-radius:5px;color:var(--faint);
    min-width:0;display:flex;align-items:center;justify-content:center}
  .cal-day.has{color:var(--text);background:#161616;cursor:pointer;font-weight:600;position:relative}
  .cal-day.has::after{content:"";position:absolute;bottom:1px;left:50%;transform:translateX(-50%);
    width:3px;height:3px;border-radius:50%;background:var(--accent)}
  .cal-day.has:hover{background:var(--accent);color:#000}

  /* ---- 메인 ---- */
  .content{flex:1;min-width:0;max-width:780px;margin:0 auto;padding:30px 26px 90px}
  .day{margin:0 0 42px;scroll-margin-top:16px}
  .day-date{font-size:.95rem;font-weight:600;color:var(--dim);margin:0 0 16px;
    padding-bottom:10px;border-bottom:1px solid var(--line)}
  .day-date .wd{color:var(--faint);font-weight:400}
  .panel{margin:0 0 22px}
  .panel-h{font-size:.8rem;font-weight:600;color:var(--faint);margin:0 0 14px;
    text-transform:uppercase;letter-spacing:.08em}
  .insight{font-size:1.18rem;line-height:1.55;font-weight:600;color:var(--text);
    margin:0 0 22px;padding:2px 0 2px 16px;border-left:2px solid var(--accent)}
  .insight .lbl{display:block;font-size:.7rem;font-weight:700;letter-spacing:.12em;
    color:var(--accent);text-transform:uppercase;margin-bottom:6px}
  ol.items{list-style:none;margin:0;padding:0}
  ol.items li{padding:11px 0;border-top:1px solid var(--line)}
  ol.items li:first-child{border-top:none}
  .t{display:flex;align-items:flex-start;gap:3px}
  .bm{background:none;border:none;color:var(--faint);cursor:pointer;font-size:.95rem;
    padding:0 5px 0 0;line-height:1.3;flex:0 0 auto}
  .bm:hover,.bm.on{color:var(--accent)}
  ol.items li a,ol.items li .t span.tt{color:var(--dim);text-decoration:none;font-size:.92rem;font-weight:500}
  ol.items li a:hover{color:var(--text)}
  ol.items li .s{color:var(--faint);font-size:.82rem;margin-top:3px}
  ol.items li.hi{padding:16px 0 16px 16px;border-left:2px solid var(--accent);margin:4px 0;
    background:linear-gradient(90deg,rgba(194,163,107,.05),transparent 70%)}
  ol.items li.hi a,ol.items li.hi .t span.tt{color:#fff;font-size:1.16rem;font-weight:700;letter-spacing:-.01em}
  ol.items li.hi .s{color:var(--dim);font-size:.92rem;margin-top:5px}
  .memo{display:block;width:100%;margin:8px 0 2px;background:#0f0f10;border:1px solid var(--line);
    border-radius:6px;color:var(--text);font-family:inherit;font-size:.82rem;padding:7px 9px;
    resize:vertical;min-height:36px;outline:none}
  .memo:focus{border-color:var(--accent)}
  .memo::placeholder{color:var(--faint)}
  .sec-name{font-size:.74rem;color:var(--faint);font-weight:700;letter-spacing:.06em;margin:18px 0 4px}
  .bm-meta{font-size:.7rem;color:var(--faint);margin:0 0 4px}
  .empty{text-align:center;color:var(--faint);padding:64px 16px}
  .empty .big{font-size:2rem;margin-bottom:10px;opacity:.6}
  .loading{text-align:center;color:var(--faint);padding:48px;font-size:.9rem}
  mark{background:rgba(194,163,107,.3);color:#fff;border-radius:2px}

  /* ---- 이번 주 일정 ---- */
  .sch-upd{color:var(--faint);font-size:.72rem;margin:0 0 16px}
  .sch-day{margin:0 0 8px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card)}
  .sch-head{display:flex;align-items:baseline;gap:8px;padding:11px 16px;background:#0f0f10;border-bottom:1px solid var(--line)}
  .sch-day.today .sch-head{background:#16140f}
  .sch-dow{font-size:.95rem;font-weight:700;color:var(--text)}
  .sch-date{font-size:.78rem;color:var(--faint)}
  .sch-cnt{margin-left:auto;font-size:.7rem;color:var(--faint)}
  .sch-today-badge{margin-left:auto;font-size:.66rem;color:var(--accent);background:rgba(194,163,107,.12);
    border-radius:10px;padding:1px 8px;font-weight:700}
  .sch-list{padding:6px 16px 10px}
  .sch-ev{display:flex;gap:12px;padding:8px 0;border-top:1px solid var(--line)}
  .sch-ev:first-child{border-top:none}
  .sch-time{flex:0 0 96px;font-size:.8rem;color:var(--accent);font-variant-numeric:tabular-nums;font-weight:600;line-height:1.45}
  .sch-time .allday{color:var(--dim)}
  .sch-title{font-size:.92rem;color:var(--text);font-weight:500;line-height:1.45}
  .sch-none{padding:9px 16px 11px;color:var(--faint);font-size:.82rem}

  @media (max-width:760px){
    .layout{flex-direction:column}
    .sidebar{position:static;width:auto;flex:none;max-height:none;border-right:none;
      border-bottom:1px solid var(--line)}
    .content{padding:22px 18px 80px}
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">Daily Briefing<span class="dot">.</span></div>
    <div class="brand-sub">매일 아침 8시 · 자동 업데이트</div>
    <input id="search" class="search" type="search" placeholder="🔎 검색 (키워드)">
    <div class="nav-sec">
      <div class="nav-h">카테고리</div>
      <button class="cat active" data-cat="all">📚 전체</button>
      <button class="cat" data-cat="news">📰 외식업 뉴스</button>
      <button class="cat" data-cat="yt">🎥 경제·트렌드 유튜브</button>
      <button class="cat" data-cat="sched">📅 이번 주 일정</button>
      <button class="cat" data-cat="bm">⭐ 북마크 <span class="badge" id="bmCount">0</span></button>
      <button class="cat" data-cat="monthly">🗓️ 월간 리캡</button>
    </div>
    <div class="nav-sec">
      <div class="nav-h">달력</div>
      <div class="cal-top">
        <button id="calPrev">‹</button>
        <span class="cal-title" id="calTitle"></span>
        <button id="calNext">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </aside>
  <main class="content" id="app"><div class="loading">불러오는 중…</div></main>
</div>
<script>
const WD=["일","월","화","수","목","금","토"];
const BMK="briefing_bookmarks_v1";
const state={news:[],yt:[],monthly:[],sched:[],schedUpd:"",idx:{},byDate:{},dates:[],cat:"all",q:"",calY:0,calM:0,bm:{}};
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function hl(s){const t=esc(s);if(!state.q)return t;
  try{return t.replace(new RegExp("("+state.q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi"),"<mark>$1</mark>");}catch(e){return t;}}
function fmtDate(d){const m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(d||"");if(!m)return esc(d||"");
  const dt=new Date(+m[1],+m[2]-1,+m[3]);return `${+m[1]}.${m[2]}.${m[3]} <span class="wd">(${WD[dt.getDay()]})</span>`;}
function itemId(it){return it.link?it.link:("t:"+(it.title||""));}
function loadBM(){try{state.bm=JSON.parse(localStorage.getItem(BMK)||"{}")||{};}catch(e){state.bm={};}}
function saveBM(){try{localStorage.setItem(BMK,JSON.stringify(state.bm));}catch(e){}
  document.getElementById("bmCount").textContent=Object.keys(state.bm).length;}
async function load(name){try{const r=await fetch(name+"?t="+Date.now());if(!r.ok)return [];
  const j=await r.json();return Array.isArray(j)?j:[];}catch(e){return [];}}
async function loadObj(name){try{const r=await fetch(name+"?t="+Date.now());if(!r.ok)return {};
  const j=await r.json();return (j&&typeof j==="object"&&!Array.isArray(j))?j:{};}catch(e){return {};}}
function fmtLocal(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function itemMatch(it){if(!state.q)return true;
  return ((it.title||"")+" "+(it.summary||"")).toLowerCase().includes(state.q.toLowerCase());}
function itemLi(it,src,date,cls){
  const id=itemId(it),on=!!state.bm[id];
  return `<li class="${cls||(it.highlight?'hi':'')}">
    <div class="t">
      <button class="bm ${on?'on':''}" data-id="${esc(id)}" data-src="${src}" data-date="${esc(date||'')}" title="저장">${on?'★':'☆'}</button>
      ${it.link?`<a href="${esc(it.link)}" target="_blank" rel="noopener">${hl(it.title)}</a>`:`<span class="tt">${hl(it.title)}</span>`}
    </div>
    ${it.summary?`<div class="s">${hl(it.summary)}</div>`:""}
    ${on?`<textarea class="memo" data-id="${esc(id)}" placeholder="메모를 적어두세요…">${esc(state.bm[id].memo||"")}</textarea>`:""}
  </li>`;
}
function itemsHTML(items,src,date){
  const f=(items||[]).filter(itemMatch);if(!f.length)return "";
  return `<ol class="items">`+f.map(it=>itemLi(it,src,date)).join("")+`</ol>`;
}
function panel(tag,e,src){
  let body="";
  if(e.sections&&e.sections.length){
    body=e.sections.map(s=>{const h=itemsHTML(s.items,src,e.date);return h?`<div class="sec-name">${esc(s.name)}</div>${h}`:"";}).join("");
  }else body=itemsHTML(e.items,src,e.date);
  if(!body&&state.q)return "";
  const showIns=e.insight&&(!state.q||(e.insight||"").toLowerCase().includes(state.q.toLowerCase())||body);
  const ins=showIns?`<div class="insight"><span class="lbl">오늘 주목</span>${hl(e.insight)}</div>`:"";
  return `<div class="panel"><div class="panel-h">${esc(tag)}</div>${ins}${body}</div>`;
}
function renderDates(){
  return state.dates.map(d=>{
    const b=state.byDate[d];let inner="";
    if((state.cat==="all"||state.cat==="news")&&b.news)inner+=panel(b.news.title||"외식업 뉴스",b.news,"news");
    if((state.cat==="all"||state.cat==="yt")&&b.yt)inner+=panel(b.yt.title||"경제·트렌드 유튜브",b.yt,"yt");
    if(!inner.trim())return "";
    return `<section class="day" id="d-${d}"><div class="day-date">${fmtDate(d)}</div>${inner}</section>`;
  }).join("");
}
function addIdx(it,src,date){if(!it)return;const id=itemId(it);if(!state.idx[id])state.idx[id]={title:it.title,summary:it.summary,link:it.link,date:date,src:src};}
function buildIdx(){
  state.news.forEach(e=>(e.items||[]).forEach(it=>addIdx(it,"news",e.date)));
  state.yt.forEach(e=>(e.sections||[]).forEach(s=>(s.items||[]).forEach(it=>addIdx(it,"yt",e.date))));
  state.monthly.forEach(m=>(m.sections||[]).forEach(s=>{const src=/경제|트렌드|유튜브/.test(s.name||"")?"yt":"news";(s.items||[]).forEach(it=>addIdx(it,src,m.month));}));
}
function renderMonthly(){
  const ms=state.monthly.slice().sort((a,b)=>(b.month||"").localeCompare(a.month||""));
  if(!ms.length)return `<div class="empty"><div class="big">🗓️</div><div>아직 월간 리캡이 없어요.</div>
    <div style="font-size:.82rem;margin-top:6px">매월 1일 아침, 지난달 핵심이 자동 정리됩니다.</div></div>`;
  const out=ms.map(m=>{
    let body="";
    (m.sections||[]).forEach(s=>{const src=/경제|트렌드|유튜브/.test(s.name||"")?"yt":"news";const h=itemsHTML(s.items,src,m.month);if(h)body+=`<div class="sec-name">${esc(s.name)}</div>${h}`;});
    if(!body&&state.q)return "";
    const ov=m.overview&&(!state.q||body||(m.overview||"").toLowerCase().includes(state.q.toLowerCase()))?`<div class="insight"><span class="lbl">이달의 총평</span>${hl(m.overview)}</div>`:"";
    if(!ov&&!body)return "";
    return `<section class="day"><div class="day-date">🗓️ ${esc(m.title||m.month)}</div>${ov}${body}</section>`;
  }).join("");
  return out.trim()||`<div class="empty"><div class="big">🔎</div><div>검색 결과가 없어요.</div></div>`;
}
function renderBM(){
  const ids=Object.keys(state.bm).filter(id=>itemMatch(state.bm[id]));
  if(!ids.length)return `<div class="empty"><div class="big">⭐</div><div>${state.q?"검색 결과가 없어요.":"저장한 항목이 없어요."}</div>
    <div style="font-size:.82rem;margin-top:6px">기사·영상 옆 ☆를 눌러 저장하면 여기 모여요.</div></div>`;
  ids.sort((a,b)=>(state.bm[b].date||"").localeCompare(state.bm[a].date||""));
  const lis=ids.map(id=>{const it=state.bm[id];const src=it.src==="yt"?"🎥":"📰";
    return `<li class="">
      <div class="bm-meta">${src} ${esc(it.date||"")}</div>
      <div class="t">
        <button class="bm on" data-id="${esc(id)}" title="저장 해제">★</button>
        ${it.link?`<a href="${esc(it.link)}" target="_blank" rel="noopener">${hl(it.title)}</a>`:`<span class="tt">${hl(it.title)}</span>`}
      </div>
      ${it.summary?`<div class="s">${hl(it.summary)}</div>`:""}
      <textarea class="memo" data-id="${esc(id)}" placeholder="메모를 적어두세요…">${esc(it.memo||"")}</textarea>
    </li>`;}).join("");
  return `<section class="day"><div class="day-date">⭐ 북마크 <span class="wd">${ids.length}개</span></div><ol class="items">${lis}</ol></section>`;
}
function renderSchedule(){
  const app=document.getElementById("app");
  const dow=["일","월","화","수","목","금","토"];
  const now=new Date(),t0=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const todayS=fmtLocal(t0);
  const byDate={};
  (state.sched||[]).forEach(e=>{if(!e||!e.date)return;
    if(state.q&&!((e.title||"").toLowerCase().includes(state.q.toLowerCase())))return;
    (byDate[e.date]=byDate[e.date]||[]).push(e);});
  Object.values(byDate).forEach(a=>a.sort((x,y)=>
    (y.allDay?1:0)-(x.allDay?1:0)||(x.start||"").localeCompare(y.start||"")));
  let cards="";
  for(let i=0;i<7;i++){
    const d=new Date(t0.getFullYear(),t0.getMonth(),t0.getDate()+i);
    const ds=fmtLocal(d),evs=byDate[ds]||[],isToday=ds===todayS;
    const right=isToday?`<span class="sch-today-badge">오늘</span>`
      :evs.length?`<span class="sch-cnt">${evs.length}건</span>`:`<span class="sch-cnt">—</span>`;
    const body=evs.length?`<div class="sch-list">`+evs.map(e=>{
        const time=e.allDay?`<span class="allday">종일</span>`
          :`${esc(e.start||"")}${e.end?"~"+esc(e.end):""}`;
        return `<div class="sch-ev"><div class="sch-time">${time}</div><div class="sch-title">${hl(e.title)}</div></div>`;
      }).join("")+`</div>`
      :`<div class="sch-none">일정 없음</div>`;
    cards+=`<div class="sch-day${isToday?' today':''}"><div class="sch-head">
      <span class="sch-dow">${dow[d.getDay()]}</span>
      <span class="sch-date">${d.getMonth()+1}.${String(d.getDate()).padStart(2,"0")}</span>${right}</div>${body}</div>`;
  }
  const upd=state.schedUpd?`<div class="sch-upd">📅 ${esc(state.schedUpd)} 기준 · 매일 아침 자동 갱신</div>`:"";
  app.innerHTML=`<section class="day"><div class="day-date">📅 이번 주 일정</div>${upd}${cards}</section>`;
}
function renderContent(){
  const app=document.getElementById("app");
  if(state.cat==="sched"){renderSchedule();return;}
  const html=state.cat==="bm"?renderBM():state.cat==="monthly"?renderMonthly():renderDates();
  app.innerHTML=html.trim()?html:
    `<div class="empty"><div class="big">◖</div><div>${state.q?"검색 결과가 없어요.":"아직 브리핑이 없어요."}</div></div>`;
}
function renderCal(){
  const grid=document.getElementById("calGrid");
  document.getElementById("calTitle").textContent=`${state.calY}.${String(state.calM+1).padStart(2,"0")}`;
  let h=WD.map(w=>`<div class="cal-wd">${w}</div>`).join("");
  const first=new Date(state.calY,state.calM,1).getDay();
  const days=new Date(state.calY,state.calM+1,0).getDate();
  for(let i=0;i<first;i++)h+=`<div class="cal-day"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${state.calY}-${String(state.calM+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    h+=state.byDate[ds]?`<div class="cal-day has" data-d="${ds}">${d}</div>`:`<div class="cal-day">${d}</div>`;
  }
  grid.innerHTML=h;
  grid.querySelectorAll(".cal-day.has").forEach(el=>el.onclick=()=>{
    if(state.cat==="bm"){state.cat="all";document.querySelectorAll(".cat").forEach(x=>x.classList.toggle("active",x.dataset.cat==="all"));renderContent();}
    const sec=document.getElementById("d-"+el.dataset.d);
    if(sec){history.replaceState(null,"","#d-"+el.dataset.d);sec.scrollIntoView({behavior:"smooth",block:"start"});}
  });
}
function toggleBM(id,src,date){
  if(state.bm[id]){delete state.bm[id];}
  else{const s=state.idx[id]||{title:id,summary:"",link:(id.startsWith("t:")?"":id),date:date,src:src};
    state.bm[id]={title:s.title,summary:s.summary,link:s.link,date:s.date||date,src:s.src||src,memo:""};}
  saveBM();renderContent();
}
(async function(){
  loadBM();
  const [news,yt,monthly,cal]=await Promise.all([load("news.json"),load("youtube.json"),load("monthly.json"),loadObj("calendar.json")]);
  state.news=news;state.yt=yt;state.monthly=monthly;
  state.sched=Array.isArray(cal.events)?cal.events:[];state.schedUpd=cal.updated||"";
  news.forEach(e=>{if(e&&e.date)(state.byDate[e.date]=state.byDate[e.date]||{}).news=e;});
  yt.forEach(e=>{if(e&&e.date)(state.byDate[e.date]=state.byDate[e.date]||{}).yt=e;});
  state.dates=Object.keys(state.byDate).sort().reverse();
  buildIdx();
  const latest=state.dates[0]||new Date().toISOString().slice(0,10);
  const lm=/^(\d{4})-(\d{2})/.exec(latest);state.calY=+lm[1];state.calM=+lm[2]-1;
  document.getElementById("bmCount").textContent=Object.keys(state.bm).length;
  document.getElementById("search").addEventListener("input",e=>{state.q=e.target.value.trim();renderContent();});
  document.querySelectorAll(".cat").forEach(b=>b.onclick=()=>{
    document.querySelectorAll(".cat").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");state.cat=b.dataset.cat;renderContent();
    document.querySelector(".content").scrollIntoView({behavior:"smooth",block:"start"});
  });
  document.getElementById("calPrev").onclick=()=>{state.calM--;if(state.calM<0){state.calM=11;state.calY--;}renderCal();};
  document.getElementById("calNext").onclick=()=>{state.calM++;if(state.calM>11){state.calM=0;state.calY++;}renderCal();};
  // 이벤트 위임: 북마크 토글 + 메모 저장
  const app=document.getElementById("app");
  app.addEventListener("click",e=>{const btn=e.target.closest(".bm");if(btn){e.preventDefault();
    toggleBM(btn.dataset.id,btn.dataset.src||"news",btn.dataset.date||"");}});
  app.addEventListener("input",e=>{if(e.target.classList.contains("memo")){
    const id=e.target.dataset.id;if(state.bm[id]){state.bm[id].memo=e.target.value;saveBM();}}});
  renderContent();renderCal();
})();
</script>
</body>
</html>
