<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>Hwei's Daily Briefing</title>
<style>
  :root{
    --bg:#000000; --card:#0d0d0f; --panel:#111113; --line:#1f1f23;
    --text:#ededed; --dim:#8a8a90; --faint:#5c5c63;
    --accent:#c2a36b;          /* 단 하나의 포인트 색 (muted gold) */
  }
  *{box-sizing:border-box}
  html,body{background:var(--bg);}
  body{margin:0;color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",
      "Segoe UI",Roboto,"Helvetica Neue",sans-serif;line-height:1.6;
    -webkit-font-smoothing:antialiased;letter-spacing:-.01em;}
  .wrap{max-width:760px;margin:0 auto;padding:28px 18px 80px;}
  header.top{padding:10px 0 20px;border-bottom:1px solid var(--line);margin-bottom:30px;}
  h1{font-size:1.55rem;font-weight:700;margin:0;letter-spacing:-.02em;}
  h1 .dot{color:var(--accent);}
  .sub{color:var(--faint);font-size:.82rem;margin:6px 0 0;font-weight:400;}

  .day{margin:0 0 40px;}
  .day-date{font-size:.92rem;font-weight:600;color:var(--dim);margin:0 0 16px;
    padding-bottom:10px;border-bottom:1px solid var(--line);}
  .day-date .wd{color:var(--faint);font-weight:400;}

  .panel{margin:0 0 22px;}
  .panel-h{font-size:.82rem;font-weight:600;color:var(--faint);margin:0 0 14px;
    text-transform:uppercase;letter-spacing:.08em;}

  /* 오늘 주목 — 크고 밝게 */
  .insight{font-size:1.18rem;line-height:1.55;font-weight:600;color:var(--text);
    margin:0 0 22px;padding:2px 0 2px 16px;border-left:2px solid var(--accent);}
  .insight .lbl{display:block;font-size:.72rem;font-weight:700;letter-spacing:.12em;
    color:var(--accent);text-transform:uppercase;margin-bottom:6px;}

  ol.items{list-style:none;margin:0;padding:0;}
  /* 일반 기사 — 작고 차분하게 */
  ol.items li{padding:11px 0;border-top:1px solid var(--line);}
  ol.items li:first-child{border-top:none;}
  ol.items li a,ol.items li .t span{color:var(--dim);text-decoration:none;
    font-size:.92rem;font-weight:500;}
  ol.items li a:hover{color:var(--text);}
  ol.items li .s{color:var(--faint);font-size:.82rem;margin-top:3px;}

  /* 주목 기사 — 크고 대비되게 */
  ol.items li.hi{padding:16px 0 16px 16px;border-left:2px solid var(--accent);
    margin:4px 0;background:linear-gradient(90deg,rgba(194,163,107,.05),transparent 70%);}
  ol.items li.hi a,ol.items li.hi .t span{color:#fff;font-size:1.16rem;font-weight:700;
    letter-spacing:-.01em;}
  ol.items li.hi .t::before{content:"★";color:var(--accent);font-size:.8rem;
    margin-right:7px;vertical-align:middle;}
  ol.items li.hi .s{color:var(--dim);font-size:.92rem;margin-top:5px;}

  .sec-name{font-size:.74rem;color:var(--faint);font-weight:700;letter-spacing:.06em;
    margin:18px 0 4px;}

  .empty{text-align:center;color:var(--faint);padding:64px 16px;}
  .empty .big{font-size:2.2rem;margin-bottom:10px;opacity:.7;}
  footer{color:var(--faint);font-size:.74rem;text-align:center;margin-top:48px;
    padding-top:20px;border-top:1px solid var(--line);}
  .loading{text-align:center;color:var(--faint);padding:48px;font-size:.9rem;}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>Daily Briefing<span class="dot">.</span></h1>
    <p class="sub">매일 아침 8시 · 외식업 뉴스 &amp; 경제·트렌드 유튜브 · 자동 업데이트</p>
  </header>
  <main id="app"><div class="loading">불러오는 중…</div></main>
  <footer><span id="foot"></span></footer>
</div>
<script>
const WD=["일","월","화","수","목","금","토"];
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function fmtDate(d){
  const m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(d||"");
  if(!m) return esc(d||"");
  const dt=new Date(+m[1],+m[2]-1,+m[3]);
  return `${+m[1]}.${m[2]}.${m[3]} <span class="wd">(${WD[dt.getDay()]})</span>`;
}
async function load(name){
  try{ const r=await fetch(name+"?t="+Date.now()); if(!r.ok) return []; const j=await r.json();
       return Array.isArray(j)?j:[]; }catch(e){ return []; }
}
function itemsHTML(items){
  if(!items||!items.length) return "";
  return `<ol class="items">`+items.map(it=>`<li class="${it.highlight?'hi':''}">
    <div class="t">${it.link?`<a href="${esc(it.link)}" target="_blank" rel="noopener">${esc(it.title)}</a>`:`<span>${esc(it.title)}</span>`}</div>
    ${it.summary?`<div class="s">${esc(it.summary)}</div>`:""}
  </li>`).join("")+`</ol>`;
}
function panel(tag,e){
  let body="";
  if(e.sections&&e.sections.length){
    body=e.sections.map(s=>`<div class="sec-name">${esc(s.name)}</div>${itemsHTML(s.items)}`).join("");
  }else{ body=itemsHTML(e.items); }
  return `<div class="panel">
    <div class="panel-h">${esc(tag)}</div>
    ${e.insight?`<div class="insight"><span class="lbl">오늘 주목</span>${esc(e.insight)}</div>`:""}
    ${body}
  </div>`;
}
(async function(){
  const [news,yt]=await Promise.all([load("news.json"),load("youtube.json")]);
  const byDate={};
  news.forEach(e=>{ if(!e||!e.date)return; (byDate[e.date]=byDate[e.date]||{}).news=e; });
  yt.forEach(e=>{ if(!e||!e.date)return; (byDate[e.date]=byDate[e.date]||{}).yt=e; });
  const dates=Object.keys(byDate).sort().reverse();
  const app=document.getElementById("app");
  if(!dates.length){
    app.innerHTML=`<div class="empty"><div class="big">◖</div>
      <div>아직 브리핑이 없어요.</div>
      <div style="font-size:.82rem;margin-top:6px">첫 브리핑은 다음 아침 8시에 올라옵니다.</div></div>`;
    return;
  }
  app.innerHTML=dates.map(d=>{
    const b=byDate[d];
    return `<section class="day">
      <div class="day-date">${fmtDate(d)}</div>
      ${b.news?panel(b.news.title||"외식업 뉴스",b.news):""}
      ${b.yt?panel(b.yt.title||"경제·트렌드 유튜브",b.yt):""}
    </section>`;
  }).join("");
  document.getElementById("foot").textContent=`${dates.length}일치 · 최신 ${dates[0]}`;
})();
</script>
</body>
</html>
